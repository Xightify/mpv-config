# === Profile / Process ===
profile=high-quality
priority=high

# === Video Output / Decoding ===
vo=gpu-next
gpu-api=auto
gpu-context=auto
hwdec=nvdec-copy,auto-safe

# === Window / Playback Behavior ===
fullscreen=yes
autofit=80%
keep-open=yes
save-watch-history=yes
save-position-on-quit=no
force-seekable=yes
cursor-autohide=100
cursor-autohide-fs-only=yes
border=no
window-corners=roundsmall
autocreate-playlist=same
reset-on-next-file=pause
taskbar-progress=no
image-display-duration=inf

# === Title ===
title=${filename/no-ext:No file}

# === OSD / Controls ===
osc=no
osd-level=1
osd-bar=no
osd-duration=1000
hr-seek=yes

# === OSD Appearance / Status ===
osd-font='Century Gothic Bold'
osd-font-size=15
osd-color='#FFFFFF'
osd-border-color='#000000'
osd-border-size=0.6
osd-blur=0.2
osd-status-msg=${playback-time/full} / ${duration} (${percent-pos}%)\nframe: ${estimated-frame-number}/${estimated-frame-count}

# === Language Priority ===
alang=auto
slang=auto

# === Audio ===
volume=90
volume-max=125
audio-file-auto=fuzzy
audio-pitch-correction=yes
audio-channels=auto
audio-exclusive=no

# === Subtitle ===
demuxer-mkv-subtitle-preroll=yes
sub-ass-use-video-data=all
sub-auto=fuzzy
subs-with-matching-audio=no
sub-fix-timing=no
sub-ass-override=no

# === Subtitle Appearance ===
sub-font='Gandhi Sans'
sub-font-size=50
sub-blur=0.1
sub-color='#FFFFFFFF'
sub-border-size=2.4
sub-border-color='#FF000000'
sub-shadow-color="#70000000"
sub-shadow-offset=0.9
sub-spacing=0.0
sub-bold=yes
sub-pos=100

# === Debanding ===
deband=no
deband-iterations=2
deband-threshold=64
deband-range=17
deband-grain=12

# === Scaling ===
scale=ewa_lanczossharp
dscale=mitchell
cscale=ewa_lanczossharp

# === Anitiring ===
# scale-antiring=0.6
# # dscale-antiring=0.6
# cscale-antiring=0.6

# === Cache ===
watch-later-dir="~~/cache/watch_later"
gpu-shader-cache-dir="~~/cache/shaders_cache"    

# === Screenshots ===
screenshot-directory="~/Pictures/mpv-screenshots"
screenshot-format=webp
screenshot-high-bit-depth=yes
screenshot-tag-colorspace=yes
screenshot-png-compression=7
screenshot-jpeg-quality=90
screenshot-webp-lossless=yes
screenshot-webp-quality=75
screenshot-template="%f-%wH.%wM.%wS.%wT"
screenshot-avif-encoder=libaom-av1
screenshot-avif-pixfmt=yuv420p
screenshot-avif-opts=usage=allintra
screenshot-jxl-distance=1.0

# === Auto Profiles ===
include="~~/profiles.conf"
