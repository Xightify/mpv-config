# ─── chapters ────────────────────────────────────
e no-osd add chapter 1 ; show-text "${chapter-metadata/by-key/title}"
E no-osd add chapter 1 ; show-text "${chapter-metadata/by-key/title}"
q no-osd add chapter -1 ; show-text "${chapter-metadata/by-key/title}"
Q no-osd add chapter -1 ; show-text "${chapter-metadata/by-key/title}"



# ─── seek ────────────────────────────────────
a seek -30
A seek -30
d seek 30
D seek 30
LEFT ignore
RIGHT ignore
WHEEL_LEFT seek -2 exact
WHEEL_RIGHT seek  2 exact
CTRL+LEFT seek -5 exact
CTRL+RIGHT seek 5 exact
Shift+BS revert-seek                   # undo the previous (or marked) seek
Shift+Ctrl+BS revert-seek mark         # mark the position for revert-seek



# ─── volume ────────────────────────────────────
UP add volume 5
DOWN add volume -5
WHEEL_UP add volume  1
WHEEL_DOWN add volume -1
m cycle mute
M cycle mute



# ─── playlist ────────────────────────────────────
b playlist-prev
B playlist-prev
n playlist-next
N playlist-next



# ─── speed ────────────────────────────────────
[ add speed -0.1
] add speed 0.1
\ set speed 1



# ─── cycle ────────────────────────────────────
f cycle fullscreen
F cycle fullscreen
j cycle sub
J cycle sub
k cycle audio
K cycle audio
ctrl+j cycle sub-fix-timing
ctrl+J cycle sub-fix-timing
ctrl+k cycle sub-gray
ctrl+K cycle sub-gray



# ─── loop / shuffle ────────────────────────────────────
l cycle-values loop-file inf no        # toggle infinite looping
L cycle-values loop-file inf no        # toggle infinite looping
F1 cycle-values loop-file inf no; show-text "Loop file: ${?loop-file==no:no}${?loop-file==inf:yes}"                                                      # loops file
F2 cycle-values loop-playlist inf no; show-text "Loop playlist: ${?loop-playlist==no:no}${?loop-playlist==inf:yes}"                                      # loops playlist
F3 playlist-shuffle; show-text "Shuffle"                                                                                                                 # shuffle
F4 ab-loop                                                                                                                                               # set/clear A-B loop points



# ─── misc ────────────────────────────────────
c cycle-values video-aspect-override "-1" "16:9" "4:3" "239:100"
C cycle-values video-aspect-override "-1" "16:9" "4:3" "239:100"
g add sub-gauss -0.05
G add sub-gauss -0.05
h add sub-gauss +0.05
H add sub-gauss +0.05
i screenshot video
I screenshot
o show-progress
O no-osd cycle-values osd-level 3 1    # toggle displaying the OSD on user interaction or always
p no-osd cycle ontop
P no-osd cycle ontop
r sub-reload
R sub-reload 
t cycle deinterlace
T cycle deinterlace
u add panscan -0.1                     # decrease panscan
U add panscan -0.1
y add panscan +0.1                     # increase panscan, shrink black bars by cropping the video
Y add panscan +0.1
x show-text ${playlist}
X show-text ${playlist}
F6 show-text ${playlist}
z script-binding stats/display-stats-toggle
Z script-binding stats/display-stats-toggle



