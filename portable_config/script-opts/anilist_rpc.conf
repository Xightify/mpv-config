# anilist_rpc v0.5
# https://github.com/Xightify/mpv-config

# Discord application client ID. Required.
client_id=1409734147836088392

# no = Start with RPC disabled. yes = Start with RPC enabled.
enabled=no

# RPC refresh interval in seconds.
refresh_interval=2

# Optional curl binary override.
curl_path=curl

# AniList request timeout in seconds.
curl_timeout=3

# Normal OSD message duration in seconds.
osd_message_duration=0.6

# Longer OSD duration for input errors and failed commands.
error_osd_message_duration=3

# AniList button label shown in Discord.
button_label=View on AniList

# AniList button link. Supported tokens: {title} {episode} {anilist_url}
button_link={anilist_url}

# Show the primary AniList button. Set to no to hide it.
primary_button_enabled=yes

# Optional second custom button. Supported tokens: {title} {episode} {anilist_url}
custom_button_label=GitHub
custom_button_url=https://github.com/Xightify/mpv-config

# Rich Presence activity type: 0=Playing, 2=Listening, 3=Watching, 5=Competing
activity_type=3

# Anime title language shown in Discord. Options: english, romaji.
title_language=english

# Discord app asset key or direct external image URL used when no anime is detected.
fallback_large_image_key=https://media1.tenor.com/m/mHN7u3KLMysAAAAd/arknights-error.gif

# Hover text used for the fallback image.
fallback_large_text=NotAnError

# If true, clear presence completely when AniList does not return a confident match.
clear_on_no_match=no

# Keybind to toggle AniList RPC on or off.
toggle_key=F9

# Keybind to toggle showing "Watching Movie".
toggle_movie_key=Shift+F10

# Keybind to prefill the manual episode number override command in mpv console.
set_episode_key=Shift+F11

# Keybind to clear the manual episode number override.
clear_episode_key=Shift+F12

# Keybind to prefill the AniList ID override command in mpv console.
set_id_key=F10

# Keybind to prefill the AniList title override command in mpv console.
set_title_key=F11

# Keybind to clear the active override.
clear_override_key=F12


# Supported tokens in the custom fields:

# {title}
# {episode}
# {anilist_url}

# Example:

# custom_button_label=Search {title}
# custom_button_url=https://www.google.com/search?q={title}
# If custom_button_label or custom_button_url is blank, that extra button is skipped.
