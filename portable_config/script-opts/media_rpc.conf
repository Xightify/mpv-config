# media_rpc v0.4
# https://github.com/Xightify/mpv-config

# Discord application client ID. Required.
client_id=1409734147836088392

# Start with RPC disabled.
enabled=no

# Refresh interval in seconds.
refresh_interval=2

# OSD message duration in seconds.
osd_message_duration=0.6

# Discord app asset key or direct external image URL used as the large image.
large_image_key=https://media1.tenor.com/m/2B0AjAmp2vMAAAAd/waiting-loading.gif

# Optional fixed RPC name. If blank, media RPC uses metadata title, then filename.
custom_name=kilometa

# Hover text for the large image.
large_image_text=FUCK TS

# Activity types: audio defaults to 2 (Listening), video defaults to 3 (Watching).
audio_activity_type=3
video_activity_type=3

# Toggle key.
toggle_key=Ctrl+F9

# Set image URL key.
set_image_key=Ctrl+F10

# Set hover text key.
set_text_key=Ctrl+F11

# Set custom title key.
set_title_key=Ctrl+F12

# Clear image override key.
clear_image_key=Ctrl+F6

# Clear text override key.
clear_text_key=Ctrl+F7

# Clear title override key.
clear_title_key=Ctrl+F8

# Clear configured custom_name for this mpv session.
clear_custom_name_key=Ctrl+F5

# Optional buttons. Supported tokens: {filename} {title} {path}
button1_label=GitHub
button1_url=https://github.com/Xightify/mpv-config
button2_label=
button2_url=
